<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Surprise</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Lemon Milk';
            src: url('https://db.onlinewebfonts.com/t/718a746f364746864115f5d625d911b3.woff2') format('woff2');
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            --env-front: #7dd3fc;
            --env-back: #38bdf8;
            --env-flap: #0ea5e9;
            --seal-blue: #1d4ed8;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            perspective: 1200px;
        }

        /* --- Envelope Styles --- */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            transform-style: preserve-3d;
            cursor: pointer;
            z-index: 10;
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--env-back);
            border-radius: 12px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1);
        }

        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--env-front);
            border-radius: 0 0 12px 12px;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 0, 50% 50%, 0 0);
            z-index: 3;
        }

        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--env-flap);
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 4;
        }

        .seal {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 44px;
            background: var(--seal-blue);
            border-radius: 50%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .open .flap { transform: rotateX(180deg); z-index: 0; }
        .open .seal { opacity: 0; }

        /* --- Question Card --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            display: none; /* Shown after envelope */
        }

        .main-title {
            font-family: 'Lemon Milk', sans-serif;
            color: #0c4a6e;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .meme-box {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid white;
            background: #eee;
        }

        .btn-yes {
            background: #0ea5e9;
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            font-family: 'Lemon Milk', sans-serif;
            font-size: 0.8rem;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3);
        }

        .btn-no {
            background: white;
            color: #64748b;
            padding: 10px 25px;
            border-radius: 50px;
            font-family: 'Lemon Milk', sans-serif;
            font-size: 0.7rem;
            border: 1px solid #e2e8f0;
            z-index: 1000;
        }

        .sparkle-bg {
            position: absolute;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

<div id="sparkle-container"></div>

<div id="envelope-container" class="envelope-wrapper" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="seal">💙</div>
    <div class="envelope-front"></div>
    <div class="envelope-back"></div>
    <p class="absolute -bottom-12 w-full text-center font-bold text-sky-700 animate-bounce">
        Click to open! ✉️
    </p>
</div>

<div class="glass-card" id="mainCard">
    <div class="meme-box" id="memeBox">
        <img id="catMeme" src="" class="w-full h-full object-cover">
    </div>
    <h1 id="question" class="main-title text-xl mb-6 min-h-[50px]"></h1>
    
    <div class="flex justify-center items-center gap-4 relative h-16">
        <button class="btn-yes" onclick="handleYes()" id="yesBtn">Yes</button>
        <button class="btn-no" id="noBtn">No</button>
    </div>
</div>

<script>
    const flow = [
        {
            question: "Be honest with me...",
            meme: "https://media.giphy.com/media/CjmvTCZf2U3p09Cn0h/giphy.gif",
            yesText: "Okay!",
            noText: "No"
        },
        {
            question: "Do you enjoy talking with me? 💙",
            meme: "https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif",
            yesText: "I love it",
            noText: "Not really"
        },
        {
            question: "Do I make you smile sometimes? 😊",
            meme: "https://media.giphy.com/media/l0HlQ7LRalQqdWfao/giphy.gif",
            yesText: "All the time",
            noText: "Rarely"
        },
        {
            question: "Will you be mine? 💖",
            meme: "https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",
            yesText: "YES!",
            noText: "Wait..."
        }
    ];

    let step = 0;
    let yesScale = 1;

    // --- Audio/Visual Effects ---
    function createSparkle() {
        const s = document.createElement('div');
        s.className = 'sparkle-bg';
        s.innerHTML = ['✨', '💙', '💎'][Math.floor(Math.random()*3)];
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = '110vh';
        document.getElementById('sparkle-container').appendChild(s);
        gsap.to(s, { y: '-120vh', x: (Math.random()-0.5)*100, duration: 4+Math.random()*2, onComplete: () => s.remove() });
    }
    setInterval(createSparkle, 700);

    // --- Envelope Logic ---
    function openEnvelope() {
        const env = document.getElementById('envelope-container');
        const card = document.getElementById('mainCard');
        env.classList.add('open');
        
        setTimeout(() => {
            gsap.to(env, { y: -50, opacity: 0, duration: 0.5, onComplete: () => {
                env.style.display = 'none';
                card.style.display = 'block';
                updateContent();
                gsap.from(card, { scale: 0.8, opacity: 0, duration: 0.8, ease: "back.out(1.7)" });
            }});
        }, 800);
    }

    // --- Content Logic ---
    function updateContent() {
        const current = flow[step];
        document.getElementById("question").innerText = current.question;
        document.getElementById("catMeme").src = current.meme;
        document.getElementById("yesBtn").innerText = current.yesText;
        document.getElementById("noBtn").innerText = current.noText;
        
        // Reset "No" button position inside the card
        gsap.set("#noBtn", { clearProps: "all", position: "relative", left: 0, top: 0 });
    }

    function handleYes() {
        confetti({ particleCount: 50, spread: 60, colors: ['#0ea5e9', '#ffffff'] });
        step++;
        if(step < flow.length) {
            gsap.to("#mainCard", { scale: 0.95, duration: 0.1, yoyo: true, repeat: 1 });
            updateContent();
        } else {
            // Final Action: Send to letter.html
            gsap.to("body", { opacity: 0, duration: 1, onComplete: () => {
                window.location.href = "letter.html";
            }});
        }
    }

    // --- The "No" Button Escape Logic (Strict Boundaries) ---
    const noBtn = document.getElementById("noBtn");
    
    function moveNo() {
        // Safe padding to ensure button isn't touching the extreme edge
        const padding = 20; 
        
        // Calculate the maximum allowed positions
        // window.innerWidth - buttonWidth - padding
        const maxX = window.innerWidth - noBtn.offsetWidth - padding;
        const maxY = window.innerHeight - noBtn.offsetHeight - padding;
        
        // Random position between padding and max
        const randomX = Math.max(padding, Math.random() * maxX);
        const randomY = Math.max(padding, Math.random() * maxY);
        
        gsap.to(noBtn, {
            position: 'fixed',
            left: randomX,
            top: randomY,
            duration: 0.2,
            ease: "power2.out"
        });

        // Make Yes button bigger
        yesScale += 0.15;
        gsap.to("#yesBtn", { scale: yesScale, duration: 0.2 });
    }

    noBtn.addEventListener("mouseover", moveNo);
    noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); moveNo(); });

</script>

</body>
</html>
