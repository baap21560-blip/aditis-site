<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Reasons</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Lemon Milk';
            src: url('https://db.onlinewebfonts.com/t/718a746f364746864115f5d625d911b3.woff2') format('woff2');
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, #f0f9ff 0%, #bae6fd 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        .jar-container {
            text-align: center;
            z-index: 10;
            width: 100%;
            pointer-events: none;
        }

        .jar {
            width: 130px;
            height: 180px;
            border: 5px solid #0ea5e9;
            border-radius: 30px 30px 60px 60px;
            position: relative;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            margin: 0 auto 20px;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.2s;
            box-shadow: 0 15px 30px rgba(14, 165, 233, 0.2);
        }

        .jar::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 10px;
            background: #0ea5e9;
            border-radius: 5px;
        }

        .reason-card {
            position: absolute;
            padding: 12px 16px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            font-family: 'Dancing Script', cursive;
            font-size: 1.1rem;
            color: #0c4a6e;
            pointer-events: none;
            z-index: 100;
            border: 1px solid rgba(14, 165, 233, 0.2);
            width: auto;
            max-width: 180px; 
            min-width: 100px;
            text-align: center;
            line-height: 1.2;
            visibility: hidden;
        }

        .instruction-text {
            font-family: 'Lemon Milk';
            color: #0c4a6e;
            letter-spacing: 2px;
            font-size: 0.7rem;
            margin-top: 10px;
            opacity: 0.6;
        }
    </style>
</head>

        function spawnReason() {
            const card = document.createElement('div');
            card.className = 'reason-card';
            card.innerText = reasons[Math.floor(Math.random() * reasons.length)];
            document.body.appendChild(card);
            
            const jarRect = document.getElementById('jar').getBoundingClientRect();
            const startX = jarRect.left + (jarRect.width / 2);
            const startY = jarRect.top + 20;

            requestAnimationFrame(() => {
    const cardWidth = card.offsetWidth;
    const cardHeight = card.offsetHeight;
    const screenW = window.innerWidth;
    const screenH = window.innerHeight;

    const padding = 20;

    // PERFECT SAFE RANDOM POSITION
    const safeX = Math.floor(Math.random() * (screenW - cardWidth - padding * 2)) + padding;
    const safeY = Math.floor(Math.random() * (screenH - cardHeight - padding * 2)) + padding;

    // SET USING LEFT/TOP (NOT TRANSFORM)
    card.style.left = safeX + "px";
    card.style.top = safeY + "px";
    card.style.visibility = "visible";

    // ANIMATION (NO POSITION OVERRIDE)
    gsap.fromTo(card,
        { scale: 0, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.7)" }
    );

    // FLOAT EFFECT (SAFE — no drift)
    gsap.to(card, {
        y: "-=8",
        duration: 1.2,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut"
    });

    // REMOVE
    gsap.to(card, {
        opacity: 0,
        scale: 0.8,
        duration: 0.5,
        delay: 2.5,
        onComplete: () => card.remove()
    });
});
        }

        document.getElementById('jar').addEventListener('click', function() {
            gsap.to(this, {
                scaleX: 1.15,
                scaleY: 0.85,
                duration: 0.1,
                yoyo: true,
                repeat: 1
            });
        });
