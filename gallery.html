<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Lemon Milk';
            src: url('https://db.onlinewebfonts.com/t/718a746f364746864115f5d625d911b3.woff2') format('woff2');
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            --primary-blue: #0ea5e9;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .title {
            font-family: 'Lemon Milk', sans-serif;
            color: #0c4a6e;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 2px 4px 8px rgba(12, 74, 110, 0.1);
        }

        /* Polaroid Effect */
        .photo-card {
            background: white;
            padding: 12px 12px 40px 12px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .photo-card:hover {
            transform: scale(1.05) rotate(0deg) !important;
            z-index: 50;
        }

        .photo-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 2px;
        }

        .caption {
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            color: #475569;
            text-align: center;
            margin-top: 15px;
        }

        /* Modal / Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(12, 74, 110, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .nav-btn {
            background: white;
            color: #0ea5e9;
            padding: 12px 24px;
            border-radius: 50px;
            font-family: 'Lemon Milk', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.15);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .nav-btn:hover {
            transform: translateY(-3px);
            background: #0ea5e9;
            color: white;
        }
    </style>
</head>
<body>

    <div class="max-w-4xl mx-auto">
        <p class="text-center text-sky-600 font-bold uppercase tracking-[0.3em] text-[10px] mb-2">Moments Captured</p>
        <h1 class="title text-3xl md:text-4xl mb-12">Our Small Gallery</h1>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-6" id="galleryGrid">
            </div>

        <div class="flex justify-between items-center mt-16">
            <a href="letter.html" class="nav-btn">← Back</a>
            <a href="music.html" class="nav-btn">Playlist →</a>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightboxImg" class="max-h-[80vh] max-w-full rounded-lg shadow-2xl">
    </div>

    <script>
        // ADD YOUR OWN IMAGES HERE
        const memories = [
            { url: 'https://images.unsplash.com/photo-1516627145497-ae6968895b74?w=500', cap: 'Special Day' },
            { url: 'https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=500', cap: 'Sweet Memories' },
            { url: 'https://images.unsplash.com/photo-1523438885200-e635ba2c371e?w=500', cap: 'Laughter & Joy' },
            { url: 'https://images.unsplash.com/photo-1494972308805-463bc619d34e?w=500', cap: 'Always Together' },
            { url: 'https://images.unsplash.com/photo-1511632765486-a01980e01a18?w=500', cap: 'Best Moments' },
            { url: 'https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=500', cap: 'Pure Happiness' }
        ];

        const grid = document.getElementById('galleryGrid');

        // Create cards
        memories.forEach((mem, i) => {
            const rot = (Math.random() - 0.5) * 10; // Random tilt
            const card = document.createElement('div');
            card.className = 'photo-card opacity-0';
            card.style.transform = `rotate(${rot}deg)`;
            card.innerHTML = `
                <img src="${mem.url}" alt="Memory">
                <p class="caption">${mem.cap}</p>
            `;
            card.onclick = () => {
                document.getElementById('lightboxImg').src = mem.url;
                document.getElementById('lightbox').style.display = 'flex';
            };
            grid.appendChild(card);
        });

        // GSAP Animation
        gsap.to(".photo-card", {
            opacity: 1,
            y: 0,
            stagger: 0.2,
            duration: 1,
            ease: "power2.out",
            delay: 0.5
        });

        // Initialize cards starting position for animation
        gsap.set(".photo-card", { y: 50 });
    </script>
</body>
</html>
